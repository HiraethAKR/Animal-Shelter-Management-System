<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staff Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="form-card">
        <h1>Staff Login</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="flash-msg {{ category }}">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('staff.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <p>
                <label>Username: <input type="text" name="username" required></label>
            </p>
            <p>
                <label>Password: <input type="password" name="password" required></label>
            </p>
            <p>
                <button type="submit">Log In</button>
            </p>
        </form>

        <p class="center-link">Need an account? <a href="{{ url_for('staff.register') }}">Register</a></p>
        <p class="center-link"><a href="{{ url_for('public.animal_list') }}">Back to public site</a></p>
    </div>
</body>
</html>
