<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staff Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="form-card">
        <h1>Staff Login</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="flash-msg {{ category }}">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('staff.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <p>
                <label>Username: <input type="text" name="username" required></label>
            </p>
            <p>
                <label>Password:
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="password" name="password" id="password" required style="flex: 1; max-width: none;">
                        <button type="button" onclick="togglePassword('password', 'eyeIcon1')" style="background: none; border: 1px solid #ccd6e0; color: #555; padding: 8px 10px;">
                            <span id="eyeIcon1">👁</span>
                        </button>
                    </div>
                </label>
            </p>
            <p>
                <button type="submit">Log In</button>
            </p>
        </form>

        <p class="center-link">Need an account? <a href="{{ url_for('staff.register') }}">Register</a></p>
        <p class="center-link"><a href="{{ url_for('public.animal_list') }}">Back to public site</a></p>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
            } else {
                input.type = 'password';
                icon.textContent = '👁';
            }
        }
    </script>
</body>
</html>
