{% extends "base.html" %}

{% block title %}Adopt an Animal{% endblock %}

{% block content %}
<div class="form-card">
    <h1>Adoption Application</h1>

    <form method="POST" action="{{ url_for('public.adopt') }}">
        <h3>Select an Animal</h3>
        <p>
            <label>Animal:
                <select name="animal_id" required>
                    <option value="">-- Choose --</option>
                    {% for a in animals %}
                    <option value="{{ a.animal_id }}" {% if form_data.animal_id == a.animal_id|string %}selected{% endif %}>
                        {{ a.name }} — {{ a.species }}{% if a.breed %} ({{ a.breed }}){% endif %}
                    </option>
                    {% endfor %}
                </select>
            </label>
        </p>

        <h3>Your Information</h3>
        <p>
            <label>First Name: <input type="text" name="first_name" value="{{ form_data.first_name or '' }}" required></label>
        </p>
        <p>
            <label>Last Name: <input type="text" name="last_name" value="{{ form_data.last_name or '' }}" required></label>
        </p>

        <h3>Contacts</h3>
        <div id="contacts-container">
            {% if form_data.contacts %}
                {% for c in form_data.contacts %}
                <div class="contact-row" style="margin-bottom: 5px;">
                    <select name="contact_type[]">
                        <option value="phone" {% if c.contact_type == 'phone' %}selected{% endif %}>Phone</option>
                        <option value="email" {% if c.contact_type == 'email' %}selected{% endif %}>Email</option>
                    </select>
                    <input type="text" name="contact_value[]" value="{{ c.contact_value }}" placeholder="Contact value">
                    <button type="button" onclick="this.parentElement.remove()">Remove</button>
                </div>
                {% endfor %}
            {% else %}
                <div class="contact-row" style="margin-bottom: 5px;">
                    <select name="contact_type[]">
                        <option value="phone">Phone</option>
                        <option value="email">Email</option>
                    </select>
                    <input type="text" name="contact_value[]" placeholder="Contact value">
                    <button type="button" onclick="this.parentElement.remove()">Remove</button>
                </div>
            {% endif %}
        </div>
        <p>
            <button type="button" onclick="addContact()">+ Add Contact</button>
        </p>

        <p>
            <label>Notes:<br>
                <textarea name="notes" rows="4" cols="40">{{ form_data.notes or '' }}</textarea>
            </label>
        </p>
        <p>
            <button type="submit">Submit Application</button>
        </p>
    </form>

    <p class="center-link"><a href="{{ url_for('public.animal_list') }}">Back to animal list</a></p>

    <script>
    function addContact() {
        const container = document.getElementById('contacts-container');
        const row = document.createElement('div');
        row.className = 'contact-row';
        row.style.marginBottom = '5px';
        row.innerHTML = `
            <select name="contact_type[]">
                <option value="phone">Phone</option>
                <option value="email">Email</option>
            </select>
            <input type="text" name="contact_value[]" placeholder="Contact value">
            <button type="button" onclick="this.parentElement.remove()">Remove</button>
        `;
        container.appendChild(row);
    }
    </script>
</div>
{% endblock %}
