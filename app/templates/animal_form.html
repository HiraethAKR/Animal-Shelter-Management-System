{% extends "base.html" %}

{% block title %}Request New Animal{% endblock %}

{% block content %}
<div class="form-card">
    <h1>Request New Animal</h1>

    <form method="POST" action="{{ url_for('public.animal_create') }}" enctype="multipart/form-data">
        <p>
            <label>Name: <input type="text" name="name" value="{{ form_data.name or '' }}" required></label>
        </p>
        <p>
            <label>Species:
                <select name="species" required>
                    {% for val in ['Dog', 'Cat', 'Bird', 'Rabbit', 'Other'] %}
                        <option value="{{ val }}" {% if form_data.species == val %}selected{% endif %}>{{ val }}</option>
                    {% endfor %}
                </select>
            </label>
        </p>
        <p>
            <label>Breed: <input type="text" name="breed" value="{{ form_data.breed or '' }}"></label>
        </p>
        <p>
            <label>Sex:
                <select name="sex" required>
                    {% for val in ['Male', 'Female'] %}
                        <option value="{{ val }}" {% if form_data.sex == val %}selected{% endif %}>{{ val }}</option>
                    {% endfor %}
                </select>
            </label>
        </p>
        <p>
            <label>Birth Date: <input type="date" name="birth_date" value="{{ form_data.birth_date or '' }}"></label>
        </p>
        <p>
            <label>Status:
                <select name="status" required>
                    {% for val in ['available', 'pending', 'adopted', 'fostered', 'unavailable'] %}
                        <option value="{{ val }}" {% if form_data.status == val %}selected{% endif %}>
                            {{ val | title }}
                        </option>
                    {% endfor %}
                </select>
            </label>
        </p>
        <p>
            <label>Photo: <input type="file" name="image" accept="image/*" onchange="previewImage(this, 'imagePreview')"></label>
            <img id="imagePreview" style="display: none; max-width: 200px; border-radius: 6px; margin-top: 8px; border: 1px solid #ccd6e0;">
        </p>
        <p>
            <label>Notes:<br>
                <textarea name="notes" rows="4" cols="40">{{ form_data.notes or '' }}</textarea>
            </label>
        </p>
        <p>
            <button type="submit">Submit Request</button>
        </p>
    </form>

    <p class="center-link"><a href="{{ url_for('public.animal_list') }}">Back to animal list</a></p>

    <script>
    function previewImage(input, previewId) {
        const preview = document.getElementById(previewId);
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
    </script>
</div>
{% endblock %}
