<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create First Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="form-card">
        <h1>Create First Admin Account</h1>
        <p class="muted" style="text-align: center;">This page is only available when no staff accounts exist.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="flash-msg {{ category }}">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('staff.bootstrap') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <p>
                <label>Username: <input type="text" name="username" required></label>
            </p>
            <p>
                <label>First Name: <input type="text" name="first_name" required></label>
            </p>
            <p>
                <label>Last Name: <input type="text" name="last_name" required></label>
            </p>
            <p>
                <label>Password: <input type="password" name="password" required></label>
            </p>
            <p>
                <button type="submit">Create Admin</button>
            </p>
        </form>
    </div>
</body>
</html>
