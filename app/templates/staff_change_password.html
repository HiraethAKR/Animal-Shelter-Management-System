{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}
    {% include "staff_nav.html" %}
    <div class="form-card">
        <h1>Change Password</h1>

        <form method="POST">
            <p>
                <label>Current Password: <input type="password" name="current_password" required></label>
            </p>
            <p>
                <label>New Password:
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="password" name="new_password" id="new_password" required style="flex: 1; max-width: none;">
                        <button type="button" onclick="togglePassword('new_password', 'eyeIcon2')" style="background: none; border: 1px solid #ccd6e0; color: #555; padding: 8px 10px;">
                            <span id="eyeIcon2">👁</span>
                        </button>
                    </div>
                </label>
            </p>
            <p>
                <label>Confirm New Password:
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="password" name="confirm_password" id="confirm_password" required style="flex: 1; max-width: none;">
                        <button type="button" onclick="togglePassword('confirm_password', 'eyeIcon3')" style="background: none; border: 1px solid #ccd6e0; color: #555; padding: 8px 10px;">
                            <span id="eyeIcon3">👁</span>
                        </button>
                    </div>
                </label>
            </p>

            <p id="passwordError" style="color: #c33; display: none; font-size: 0.85rem;">
                Passwords do not match.
            </p>

            <p>
                <button type="submit">Update Password</button>
            </p>
        </form>

        <p class="center-link"><a href="{{ url_for('staff.dashboard') }}">Back to dashboard</a></p>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
            } else {
                input.type = 'password';
                icon.textContent = '👁';
            }
        }

        document.querySelector('form').addEventListener('submit', function(e) {
            const newPass = document.getElementById('new_password').value;
            const confirm = document.getElementById('confirm_password').value;
            const errorMsg = document.getElementById('passwordError');

            if (newPass !== confirm) {
                e.preventDefault();
                errorMsg.style.display = 'block';
            } else {
                errorMsg.style.display = 'none';
            }
        });
    </script>
{% endblock %}
